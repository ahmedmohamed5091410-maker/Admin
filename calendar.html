<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Calendar - Antigravity Admin</title>
  <meta name="description" content="Manage administrative calendar schedules, upcoming calls, launch deadlines, and meetings.">
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="responsive.css">
  <!-- Lucide Icons CDN -->
  <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
  <style>
    /* Premium Calendar Grid Styles */
    .calendar-container {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
    }
    
    @media (max-width: 900px) {
      .calendar-container { grid-template-columns: 1fr; }
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: var(--card-bg);
      overflow: hidden;
    }

    .calendar-header-cell {
      padding: 0.75rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      background-color: var(--background);
      border-bottom: 1px solid var(--border-color);
    }

    .calendar-day-cell {
      min-height: 100px;
      padding: 0.5rem;
      border-right: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      transition: background-color var(--transition-fast);
      cursor: pointer;
    }
    
    .calendar-day-cell:nth-child(7n) { border-right: none; }
    
    .calendar-day-cell:hover { background-color: var(--background); }
    
    .calendar-day-cell.outside-month {
      background-color: var(--background);
      color: var(--text-muted);
      cursor: not-allowed;
      pointer-events: none;
    }

    .calendar-day-number {
      font-weight: 600;
      font-size: 0.85rem;
      align-self: flex-end;
    }

    .calendar-day-cell.today .calendar-day-number {
      background-color: var(--primary);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Event Badge inside cell */
    .calendar-event {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: var(--radius-xs);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .event-meeting { background-color: var(--primary-soft); color: var(--primary); border-color: var(--primary-soft-border); }
    .event-deadline { background-color: var(--danger-soft); color: var(--danger); border-color: var(--danger-border); }
    .event-personal { background-color: var(--success-soft); color: var(--success); border-color: var(--success-border); }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <main class="app-content">
      <!-- Header Placeholder -->
      <div id="header-placeholder"></div>

      <div class="page-body animate-fade-in-up">
        <!-- Header Title with Navigation -->
        <div class="flex-between">
          <div>
            <h2 style="font-size: 1.5rem; font-weight: 700;">Operational Calendar</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Coordinate upcoming meetups, launch goals, and meeting schedules.</p>
          </div>
          <div class="flex-row">
            <button class="btn btn-secondary" id="cal-prev-btn"><i data-lucide="chevron-left"></i></button>
            <h3 id="cal-month-title" style="font-size: 1.15rem; font-weight: 700; width: 140px; text-align: center;">June 2026</h3>
            <button class="btn btn-secondary" id="cal-next-btn"><i data-lucide="chevron-right"></i></button>
            <button class="btn btn-primary" id="cal-add-event-btn"><i data-lucide="plus"></i> Add Event</button>
          </div>
        </div>

        <!-- Main Layout Split -->
        <div class="calendar-container">
          <!-- Calendar Grid Sheet -->
          <div class="calendar-grid" id="calendar-days-grid">
            <!-- Day labels and grids injected by JS -->
          </div>

          <!-- Calendar Sidebar Panel -->
          <div class="flex-column" style="gap: 1.5rem;">
            <!-- Upcoming Meetings list -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title" style="font-size: 0.9rem;">Upcoming Briefings</h3>
              </div>
              <div class="flex-column" id="cal-sidebar-meetings" style="gap: 1rem;">
                <!-- Meetings items -->
              </div>
            </div>

            <!-- Deadlines status -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title" style="font-size: 0.9rem;">Task Deadlines</h3>
              </div>
              <div class="flex-column" id="cal-sidebar-deadlines" style="gap: 1rem;">
                <!-- Deadlines items -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals Section -->

  <!-- Add Event Modal -->
  <div class="modal-overlay" id="cal-event-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create Calendar Event</h3>
        <button class="btn btn-icon close-modal"><i data-lucide="x"></i></button>
      </div>
      <form id="cal-event-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="evt-title">Event Title</label>
            <input type="text" id="evt-title" class="form-control" required placeholder="Launch Sync Call">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="evt-date">Scheduled Date</label>
              <input type="date" id="evt-date" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="evt-time">Scheduled Time</label>
              <input type="time" id="evt-time" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="evt-category">Event Category</label>
            <select id="evt-category" class="form-control">
              <option value="meeting">Briefing / Meeting</option>
              <option value="deadline">Task Deadline</option>
              <option value="personal">Milestone / Personal</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Schedule Event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Main scripts -->
  <script type="module" src="app.js"></script>
  <script type="module" src="calendar.js"></script>
</body>
</html>
