<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Inventory - Antigravity Admin</title>
  <meta name="description" content="Manage system stock counts, adjust item prices, organize categories, and track low-stock items.">
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="responsive.css">
  <!-- Lucide Icons CDN -->
  <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <main class="app-content">
      <!-- Header Placeholder -->
      <div id="header-placeholder"></div>

      <div class="page-body animate-fade-in-up">
        <!-- Breadcrumb / Header Title -->
        <div class="flex-between">
          <div>
            <h2 style="font-size: 1.5rem; font-weight: 700;">Products & Stock</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Monitor quantities, adjust pricing structures, and manage the storefront catalog.</p>
          </div>
          <div class="flex-row">
            <button class="btn btn-primary" id="add-product-btn">
              <i data-lucide="plus"></i> Add Product
            </button>
          </div>
        </div>

        <!-- Filter Toolbar -->
        <div class="card" style="padding: 1rem;">
          <div class="flex-between" style="flex-wrap: wrap; gap: 1rem;">
            <div class="flex-row" style="flex: 1; min-width: 250px;">
              <!-- Search -->
              <div class="search-box" style="width: 100%;">
                <i data-lucide="search"></i>
                <input type="text" id="products-search" class="form-control" placeholder="Search by name or category...">
              </div>
            </div>
            
            <div class="flex-row" style="gap: 0.75rem; flex-wrap: wrap;">
              <!-- Category filter -->
              <select id="filter-category" class="form-control" style="width: 170px; cursor: pointer;">
                <option value="all">All Categories</option>
                <option value="Accessories">Accessories</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Home Decor">Home Decor</option>
              </select>

              <!-- Stock status filter -->
              <select id="filter-stock" class="form-control" style="width: 170px; cursor: pointer;">
                <option value="all">All Statuses</option>
                <option value="in-stock">In Stock</option>
                <option value="low-stock">Low Stock</option>
                <option value="out-of-stock">Out of Stock</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Products Table -->
        <div class="table-responsive">
          <table class="table" id="products-table">
            <thead>
              <tr>
                <th style="width: 60px;">Image</th>
                <th style="cursor: pointer;" data-sort="name">Product Name <i data-lucide="arrow-up-down" style="width: 12px; height: 12px; margin-left: 4px;"></i></th>
                <th style="cursor: pointer;" data-sort="category">Category <i data-lucide="arrow-up-down" style="width: 12px; height: 12px; margin-left: 4px;"></i></th>
                <th style="cursor: pointer;" data-sort="stock">Stock Count <i data-lucide="arrow-up-down" style="width: 12px; height: 12px; margin-left: 4px;"></i></th>
                <th style="cursor: pointer;" data-sort="price">Retail Price <i data-lucide="arrow-up-down" style="width: 12px; height: 12px; margin-left: 4px;"></i></th>
                <th style="cursor: pointer;" data-sort="status">Stock Status <i data-lucide="arrow-up-down" style="width: 12px; height: 12px; margin-left: 4px;"></i></th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="products-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
          <div style="font-size: 0.85rem; color: var(--text-secondary);" id="pagination-info">
            Showing 1-10 of 100 products
          </div>
          <div class="pagination-numbers" id="pagination-controls">
            <!-- Buttons dynamically generated -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals Section -->

  <!-- Add Product Modal -->
  <div class="modal-overlay" id="add-product-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Add New Product</h3>
        <button class="btn btn-icon close-modal"><i data-lucide="x"></i></button>
      </div>
      <form id="add-product-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="add-name">Product Title</label>
            <input type="text" id="add-name" class="form-control" required placeholder="Wireless Keyboard Pro">
          </div>
          <div class="form-group">
            <label class="form-label" for="add-category">Category</label>
            <select id="add-category" class="form-control">
              <option value="Electronics">Electronics</option>
              <option value="Accessories">Accessories</option>
              <option value="Furniture">Furniture</option>
              <option value="Home Decor">Home Decor</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="add-price">Price ($)</label>
              <input type="number" step="0.01" min="0" id="add-price" class="form-control" required placeholder="99.99">
            </div>
            <div class="form-group">
              <label class="form-label" for="add-stock">Initial Stock Quantity</label>
              <input type="number" min="0" id="add-stock" class="form-control" required placeholder="25">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="add-image">Image URL</label>
            <input type="url" id="add-image" class="form-control" placeholder="https://example.com/product.jpg">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Product Modal -->
  <div class="modal-overlay" id="edit-product-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Product Details</h3>
        <button class="btn btn-icon close-modal"><i data-lucide="x"></i></button>
      </div>
      <form id="edit-product-form">
        <input type="hidden" id="edit-id">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="edit-name">Product Title</label>
            <input type="text" id="edit-name" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="edit-category">Category</label>
            <select id="edit-category" class="form-control">
              <option value="Electronics">Electronics</option>
              <option value="Accessories">Accessories</option>
              <option value="Furniture">Furniture</option>
              <option value="Home Decor">Home Decor</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="edit-price">Price ($)</label>
              <input type="number" step="0.01" min="0" id="edit-price" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="edit-stock">Stock Quantity</label>
              <input type="number" min="0" id="edit-stock" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="edit-image">Image URL</label>
            <input type="url" id="edit-image" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Main scripts -->
  <script type="module" src="app.js"></script>
  <script type="module" src="products.js"></script>
</body>
</html>
